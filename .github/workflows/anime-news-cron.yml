name: Anime news sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Crunchyroll RSS into anime news drafts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://clashanime.com' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured in GitHub repository secrets."
            exit 1
          fi
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron/anime-news"
